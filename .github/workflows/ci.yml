name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend build & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm install --ignore-scripts --legacy-peer-deps
      - run: npm test
      - run: npm run build

  contracts:
    name: Soroban contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            contracts/payment-log
            contracts/escrow
      - name: Test payment-log
        working-directory: contracts/payment-log
        run: cargo test
      - name: Test escrow
        working-directory: contracts/escrow
        run: cargo test
